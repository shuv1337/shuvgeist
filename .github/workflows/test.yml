name: Test

on:
  push:
    branches:
      - main
  pull_request:

env:
  MINI_LIT_VERSION: 0.2.1
  PI_MONO_VERSION: 0.67.68

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Use published sibling packages
        run: |
          npm pkg set \
            "dependencies.@mariozechner/mini-lit=${MINI_LIT_VERSION}" \
            "dependencies.@mariozechner/pi-ai=${PI_MONO_VERSION}" \
            "dependencies.@mariozechner/pi-agent-core=${PI_MONO_VERSION}" \
            "dependencies.@mariozechner/pi-web-ui=${PI_MONO_VERSION}"

      - name: Install root deps
        run: npm install

      - name: Run fast checks
        run: ./check.sh

      - name: Run component tests
        run: npm run test:component

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Use published sibling packages
        run: |
          npm pkg set \
            "dependencies.@mariozechner/mini-lit=${MINI_LIT_VERSION}" \
            "dependencies.@mariozechner/pi-ai=${PI_MONO_VERSION}" \
            "dependencies.@mariozechner/pi-agent-core=${PI_MONO_VERSION}" \
            "dependencies.@mariozechner/pi-web-ui=${PI_MONO_VERSION}"

      - name: Install root deps
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Build extension
        run: npm run build:chrome

      - name: Run extension smoke
        run: npm run test:e2e:extension

      - name: Upload extension traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: extension-playwright-traces
          path: test-results

  site-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root deps
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run site smoke
        run: npm run test:e2e:site

      - name: Upload site traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: site-playwright-traces
          path: test-results

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Use published sibling packages
        run: |
          npm pkg set \
            "dependencies.@mariozechner/mini-lit=${MINI_LIT_VERSION}" \
            "dependencies.@mariozechner/pi-ai=${PI_MONO_VERSION}" \
            "dependencies.@mariozechner/pi-agent-core=${PI_MONO_VERSION}" \
            "dependencies.@mariozechner/pi-web-ui=${PI_MONO_VERSION}"

      - name: Install root deps
        run: npm install

      - name: Run coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
